name: Infra

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: infra-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  TF_VERSION: '1.9.8'
  TF_WORKING_DIR: terraform
  TF_STATE_BUCKET: tf-state-semblo-d66d8b93
  TF_STATE_LOCK_TABLE: tf-state-semblo-lock
  AWS_REGION: eu-central-1

jobs:
  terraform:
    name: Terraform plan / apply
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      id-token: write
      contents: read
      pull-requests: write   # so plan output can be posted as a PR comment

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      - name: terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}"

      - name: terraform validate
        run: terraform validate -no-color

      - name: terraform plan
        id: plan
        run: |
          set -o pipefail
          terraform plan -input=false -no-color -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan.txt', 'utf8');
            const body = [
              '### Terraform plan',
              '<details><summary>Show plan</summary>',
              '',
              '```hcl',
              plan.slice(0, 60000),
              '```',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -input=false -auto-approve tfplan

  deploy-files:
    name: Roll out compose + Caddyfile to EC2
    needs: terraform
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    concurrency:
      group: deploy-prod-infra
      cancel-in-progress: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger SSM redeploy on EC2
        env:
          INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "infra rollout $SHA" \
            --parameters commands="[
              \"set -e\",
              \"cd /opt/semblo\",
              \"git -C infra-repo pull --ff-only origin main\",
              \"docker compose -f compose.prod.yml pull\",
              \"docker compose -f compose.prod.yml up -d\"
            ]" \
            --query 'Command.CommandId' --output text)

          echo "SSM command id: $CMD_ID"

          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo 'Pending')
            echo "  [$i] status: $STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut) ;&
              *Error*)
                aws ssm get-command-invocation \
                  --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
                  --query '{Status:Status, StdOut:StandardOutputContent, StdErr:StandardErrorContent}'
                exit 1
                ;;
            esac
            sleep 5
          done

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text
